<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE-edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if description %}{{ description }}{% else %}Discover the expertise of a seasoned technical writer through a comprehensive portfolio showcasing years of industry experience and technical knowledge.{% endif %}">
  <title>{% if title %}{{ title }} — {% endif %}Haletha Judkins' Portfolio Website</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G544T50X3C"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-G544T50X3C');
  </script>

  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/1337db0a3c.js" crossorigin="anonymous"></script>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/styles.css">
</head>

<body>

  <!-- Header Section-->
  <header class="header">
    <a href="/" class="logo">Haletha<span>Judkins</span></a>
    <a class="menu fas fa-bars"></a>
    <nav class="navbar">
      <a href="/">Home</a>
      <a href="/#about">About</a>
      <a href="/#skills">Skills</a>
      <a href="/#portfolio">Portfolio</a>
      <a href="/blog/">Blog</a>
      <a href="/#contact">Contact</a>
    </nav>
  </header>

  <!-- Page content injected here by Eleventy -->
  <main>
    {{ content | safe }}
  </main>

  <!-- Footer Section-->
  <section class="footer">
    <a href="/" class="logo">Haletha<span>Judkins</span></a>
    <p>&copy;<span id="year"></span> Haletha Judkins | <a href="/blog/">Blog</a> | <a href="/privacy_policy.html">Privacy Policy</a></p>
    <div class="socials">
      <a href="https://twitter.com/halethajudkins">
        <ion-icon name="logo-twitter"></ion-icon>
      </a>
      <a href="https://www.linkedin.com/in/halethajudkins">
        <ion-icon name="logo-linkedin"></ion-icon>
      </a>
      <a href="https://github.com/creativeleej">
        <ion-icon name="logo-github"></ion-icon>
      </a>
    </div>
  </section>

  <!-- cdnjs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <!-- ionicons cdn -->
  <script src="https://unpkg.com/ionicons@4.5.10-0/dist/ionicons.js"></script>

  <!-- Local js File -->
  <script src="/script.js"></script>

  <!-- Web3Forms js file -->
  <script src="https://web3forms.com/client/script.js" async defer></script>

  <!-- Year in footer -->
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
